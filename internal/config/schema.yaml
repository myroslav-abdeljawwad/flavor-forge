# flavor-forge configuration schema
#
# This file defines the structure and constraints of the YAML experiment
# configurations used by flavor-forge.  It is intended to be validated
# against a JSON Schema or similar tool before being processed by the
# pipeline loader.
#
# Author: Myroslav Mokhammad Abdeljawwad

$schema: "http://json-schema.org/draft-07/schema#"
title: FlavorForge Experiment Configuration
description: |
  A declarative description of machine learning experiment pipelines.
type: object
required:
  - name
  - steps
properties:
  # The unique identifier for the experiment.
  name:
    type: string
    minLength: 1
    maxLength: 128
    pattern: "^[a-zA-Z0-9_-]+$"
    description: |
      A human‑readable name used to identify the experiment in logs and reports.

  # Optional metadata about the experiment.
  metadata:
    type: object
    additionalProperties: true
    description: |
      Free‑form key/value pairs that can be used for tagging, versioning,
      or any custom information. All values must be JSON serialisable.

  # The list of pipeline steps executed in order.
  steps:
    type: array
    minItems: 1
    items:
      $ref: "#/definitions/step"

  # Optional global environment variables applied to all steps.
  env:
    type: object
    additionalProperties:
      type: string
    description: |
      Environment variables set for every step unless overridden locally.

  # Optional output directory where artefacts are stored.
  output_dir:
    type: string
    minLength: 1
    default: "./artifacts"
    description: |
      Path relative to the experiment root. All produced files will be
      placed under this directory, preserving sub‑structure defined by steps.

definitions:
  step:
    type: object
    required:
      - name
      - command
    properties:
      # Unique identifier for the step.
      name:
        type: string
        minLength: 1
        maxLength: 64
        pattern: "^[a-zA-Z0-9_-]+$"
        description: |
          Name of the pipeline stage. Must be unique within an experiment.

      # The shell command to execute for this step.
      command:
        type: string
        minLength: 1
        description: |
          A single line or multi‑line string that will be passed to `/bin/sh -c`.
          Use `$` variables to interpolate environment values.

      # Optional list of inputs required by the step.
      inputs:
        type: array
        items:
          $ref: "#/definitions/input"
        description: |
          Paths relative to the experiment root. Each input will be validated
          for existence before the command runs.

      # Optional list of outputs produced by the step.
      outputs:
        type: array
        items:
          $ref: "#/definitions/output"
        description: |
          Files or directories that the step is expected to generate.
          These paths are used to populate the output directory and for
          dependency resolution between steps.

      # Optional environment variables scoped to this step.
      env:
        type: object
        additionalProperties:
          type: string
        description: |
          Overrides or extends the global `env` values for this particular step.

  input:
    type: object
    required:
      - path
    properties:
      path:
        type: string
        minLength: 1
        description: |
          File or directory path relative to the experiment root.
      optional:
        type: boolean
        default: false
        description: |
          If true, missing inputs are tolerated and a warning is logged.

  output:
    type: object
    required:
      - path
    properties:
      path:
        type: string
        minLength: 1
        description: |
          Destination relative to the experiment root where the step will write.
      persist:
        type: boolean
        default: true
        description: |
          Whether the output should be copied into `output_dir` after the step finishes.

# Example of a valid configuration that could live in examples/experiment.yml
examples:
  - name: "image-classification"
    metadata:
      owner: "alice@example.com"
      tags: ["vision", "cnn"]
    env:
      PYTHONUNBUFFERED: "1"
      CUDA_VISIBLE_DEVICES: "0,1"
    output_dir: "./results"
    steps:
      - name: prepare_data
        command: |
          python scripts/prepare.py --src data/raw \
                                    --dst $output_dir/data/prepared
        outputs:
          - path: "$output_dir/data/prepared"
            persist: true

      - name: train_model
        env:
          BATCH_SIZE: "64"
        command: |
          python scripts/train.py --data $output_dir/data/prepared \
                                  --model $output_dir/models/model.pt
        inputs:
          - path: "$output_dir/data/prepared"
            optional: false
        outputs:
          - path: "$output_dir/models/model.pt"
            persist: true

      - name: evaluate_model
        command: |
          python scripts/eval.py --data $output_dir/data/prepared \
                                 --model $output_dir/models/model.pt \
                                 --report $output_dir/reports/metrics.json
        inputs:
          - path: "$output_dir/data/prepared"
            optional: false
          - path: "$output_dir/models/model.pt"
            optional: false
        outputs:
          - path: "$output_dir/reports/metrics.json"
            persist: true

# End of schema.yaml